# Regression harness — reliability hardening (in-band failure demotion, timeout
# coverage, /api/circuit observability) over PG18.4.
listen_address = "127.0.0.1:6432"
admin_address  = "127.0.0.1:9099"
tr_enabled = false
tr_mode    = "none"
write_timeout_secs = 30

[pool]
min_connections = 1
max_connections = 20
idle_timeout_secs = 300
max_lifetime_secs = 1800
acquire_timeout_secs = 5
test_on_acquire = true

[load_balancer]
read_strategy = "round_robin"
read_write_split = false
latency_threshold_ms = 100

# A long interval so that, during the brief stop→query window, the periodic
# checker cannot be what marks the node unhealthy — any demotion in that window
# is the in-band path. Recovery still happens on the next tick (<=30s).
[health]
check_interval_secs = 30
check_timeout_secs = 2
failure_threshold = 1
success_threshold = 1
check_query = "SELECT 1"

[circuit_breaker]
enabled = true
failure_threshold = 2
open_secs = 3
success_threshold = 1

[[nodes]]
host = "127.0.0.1"
port = 25433
role = "primary"
weight = 100
enabled = true
name = "pg-primary"
