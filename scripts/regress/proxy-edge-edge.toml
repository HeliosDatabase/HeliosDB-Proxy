# Edge e2e — EDGE role. Serves reads from a local cache; forwards misses and
# writes to the home over PG-wire (its single [[nodes]] entry is the home's
# client port); subscribes to the home admin's SSE stream for invalidations.
listen_address = "127.0.0.1:6441"
admin_address  = "127.0.0.1:9441"
tr_enabled = false
tr_mode    = "none"

[pool]
min_connections   = 1
max_connections   = 10
idle_timeout_secs = 300
max_lifetime_secs = 1800
acquire_timeout_secs = 5
test_on_acquire = true

[load_balancer]
read_strategy = "round_robin"
read_write_split = false
latency_threshold_ms = 100

[health]
check_interval_secs = 30
check_timeout_secs = 3
failure_threshold = 3
success_threshold = 2
check_query = "SELECT 1"

[edge]
enabled                 = true
role                    = "edge"
region                  = "edge-1"
edge_id                 = "edge-e2e-1"
home_url                = "http://127.0.0.1:9440"
auth_token              = "edge-e2e-secret"
# Loopback-only test: the bearer rides plain http. Production uses https.
allow_insecure_home_url = true
default_ttl_secs        = 60
max_entries             = 10000

# Data plane: the home proxy's PG-wire port looks like a regular Postgres node.
[[nodes]]
host    = "127.0.0.1"
port    = 6440
role    = "primary"
weight  = 100
enabled = true
name    = "home-proxy"
