# Regression harness — read-your-writes (lag-routing). 2-node read/write-split
# over the same instance at two distinct addresses (127.0.0.1:25433 primary,
# localhost:25433 standby) so the routing DECISION is observable in the log.
# With RYW, a read issued within the window after a write is pinned to the
# primary; a read with no preceding write is eligible for the standby.
listen_address = "127.0.0.1:6432"
admin_address  = "127.0.0.1:9099"
tr_enabled = false
tr_mode    = "none"
write_timeout_secs = 30

[pool]
min_connections = 1
max_connections = 20
idle_timeout_secs = 300
max_lifetime_secs = 1800
acquire_timeout_secs = 5
test_on_acquire = true

[load_balancer]
read_strategy = "round_robin"
read_write_split = true
latency_threshold_ms = 100

[health]
check_interval_secs = 30
check_timeout_secs = 3
failure_threshold = 3
success_threshold = 2
check_query = "SELECT 1"

[lag_routing]
enabled = true
ryw_window_ms = 3000
max_lag_bytes = 0

[[nodes]]
host = "127.0.0.1"
port = 25433
role = "primary"
weight = 100
enabled = true
name = "pg-primary"

[[nodes]]
host = "localhost"
port = 25433
role = "standby"
weight = 100
enabled = true
name = "pg-standby"
