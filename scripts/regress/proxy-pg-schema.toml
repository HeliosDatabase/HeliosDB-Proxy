# Regression harness — schema/workload-aware routing. A primary plus a disabled
# "analytics" node (localhost:25433, a distinct address for log observability).
# Analytical (OLAP) queries are routed to the analytics node; everything else
# uses default routing. (The analytics node is disabled + unreachable in this
# single-instance env, so the routing DECISION is asserted via the proxy log.)
listen_address = "127.0.0.1:6432"
admin_address  = "127.0.0.1:9099"
tr_enabled = false
tr_mode    = "none"
write_timeout_secs = 30

[pool]
min_connections = 1
max_connections = 20
idle_timeout_secs = 300
max_lifetime_secs = 1800
acquire_timeout_secs = 5
test_on_acquire = true

[load_balancer]
read_strategy = "round_robin"
read_write_split = true
latency_threshold_ms = 100

[health]
check_interval_secs = 30
check_timeout_secs = 3
failure_threshold = 3
success_threshold = 2
check_query = "SELECT 1"

[schema_routing]
enabled = true
analytics_node = "pg-analytics"

[[nodes]]
host = "127.0.0.1"
port = 25433
role = "primary"
weight = 100
enabled = true
name = "pg-primary"

[[nodes]]
host = "localhost"
port = 25433
role = "standby"
weight = 100
enabled = false
name = "pg-analytics"
