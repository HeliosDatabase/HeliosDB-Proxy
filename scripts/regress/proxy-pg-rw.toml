# Regression harness — 2-node read/write-split config. Both nodes are the
# SAME PostgreSQL 18.4 instance reached at two addresses (port-mapped
# 127.0.0.1:25433 and container-bridge 172.17.0.2:5432), so they share data
# and correctness is preserved while exercising the read/write-split switch
# path and the per-session connection cache (Batch C).
listen_address = "127.0.0.1:6432"
admin_address  = "127.0.0.1:9099"
tr_enabled = false
tr_mode    = "none"
write_timeout_secs = 30

[pool]
min_connections = 2
max_connections = 50
idle_timeout_secs = 300
max_lifetime_secs = 1800
acquire_timeout_secs = 5
test_on_acquire = true

[load_balancer]
read_strategy = "round_robin"
read_write_split = true
latency_threshold_ms = 100

[health]
check_interval_secs = 5
check_timeout_secs = 3
failure_threshold = 3
success_threshold = 2
check_query = "SELECT 1"

[[nodes]]
host = "127.0.0.1"
port = 25433
role = "primary"
weight = 100
enabled = true
name = "pg-primary"

[[nodes]]
host = "172.17.0.2"
port = 5432
role = "standby"
weight = 100
enabled = true
name = "pg-standby"
