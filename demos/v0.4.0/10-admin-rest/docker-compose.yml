name: hdb-demo-rest

networks: { net: }

services:
  pg-primary:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: demo
    networks: [net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d demo"]
      interval: 1s
      timeout: 1s
      retries: 30

  proxy:
    image: ghcr.io/heliosdatabase/hdb-heliosdb-proxy:0.6.0
    depends_on:
      pg-primary:
        condition: service_healthy
    environment:
      RUST_LOG: warn
    networks: [net]
    ports:
      - "6432:6432"
      - "9090:9090"
    volumes:
      - ../_shared/proxy.base.toml:/etc/helios/proxy.toml:ro
    command: ["--config", "/etc/helios/proxy.toml"]
