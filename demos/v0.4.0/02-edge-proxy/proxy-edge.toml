listen_address = "0.0.0.0:6432"
admin_address  = "0.0.0.0:9090"

[pool]
min_connections   = 2
max_connections   = 20
idle_timeout_secs = 300

# Edge proxies forward to the home for cache misses + writes. Same
# wire protocol; the home looks like a regular Postgres node from
# the edge's perspective.
[[nodes]]
host    = "proxy-home"
port    = 6432
role    = "primary"
weight  = 100
enabled = true

[edge]
enabled     = true
role        = "edge"
home_url    = "http://proxy-home:9090"
auth_token  = "demo-token"
# Demo-only: the compose network is private, so the bearer may ride
# plain http here. Production must use an https home_url instead.
allow_insecure_home_url = true
default_ttl_secs = 60
max_entries = 10000
