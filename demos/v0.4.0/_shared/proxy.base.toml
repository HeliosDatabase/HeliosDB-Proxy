# Minimal proxy.toml shared across v0.4.0 demos.
# Demos that need extra blocks (plugins, anomaly, edge) extend this
# by writing their own override file alongside.

listen_address = "0.0.0.0:6432"
admin_address  = "0.0.0.0:9090"
tr_enabled     = false

[pool]
min_connections    = 2
max_connections    = 20
idle_timeout_secs  = 300

[[nodes]]
host    = "pg-primary"
port    = 5432
role    = "primary"
weight  = 100
enabled = true
