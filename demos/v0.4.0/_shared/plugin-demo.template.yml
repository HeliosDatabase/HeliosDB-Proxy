# Reusable docker-compose template for plugin demos.
# Per-plugin demos extend this by adding a `proxy.toml` overlay
# and (optionally) a `plugins/` directory with the .wasm.
#
# Replace `__DEMO_NAME__` with the demo's project name when copying.

name: hdb-demo-__DEMO_NAME__

networks: { net: }

services:
  pg-primary:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: demo
    networks: [net]
    volumes:
      - ../_shared/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d demo"]
      interval: 1s
      timeout: 1s
      retries: 30

  proxy:
    image: ghcr.io/dimensigon/hdb-heliosdb-proxy:0.4.0
    depends_on:
      pg-primary:
        condition: service_healthy
    environment:
      RUST_LOG: info
    networks: [net]
    ports:
      - "6432:6432"
      - "9090:9090"
    volumes:
      - ./proxy.toml:/etc/helios/proxy.toml:ro
      - ./plugins:/var/lib/helios/plugins:ro
    command: ["--config", "/etc/helios/proxy.toml"]
