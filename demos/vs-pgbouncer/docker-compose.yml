# HeliosProxy vs PgBouncer — Side-by-Side Failover Comparison
#
# Two identical PostgreSQL clusters. One fronted by HeliosProxy (with TR),
# one fronted by PgBouncer. Kill both primaries simultaneously and compare.
#
# Usage: ./run-compare.sh

networks:
  compare-net:
    driver: bridge

volumes:
  hp-primary-data:
  hp-standby-data:
  pb-primary-data:
  pb-standby-data:

services:
  # ═══════════════════════════════════════════════════════════════════════
  # HELIOSPROXY CLUSTER
  # ═══════════════════════════════════════════════════════════════════════

  hp-primary:
    image: postgres:16-alpine
    container_name: hp-primary
    hostname: hp-primary
    networks:
      - compare-net
    ports:
      - "55432:5432"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: benchdb
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "hot_standby=on"
      - "-c"
      - "synchronous_commit=on"
      - "-c"
      - "synchronous_standby_names='*'"
      - "-c"
      - "listen_addresses=*"
      - "-c"
      - "password_encryption=md5"
    volumes:
      - hp-primary-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d benchdb"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 10s

  hp-standby:
    image: postgres:16-alpine
    container_name: hp-standby
    hostname: hp-standby
    networks:
      - compare-net
    ports:
      - "55442:5432"
    environment:
      PGUSER: app
      PGPASSWORD: apppass
    entrypoint: /bin/bash
    command:
      - -c
      - |
        until pg_isready -h hp-primary -U app; do
          echo "Waiting for primary..."
          sleep 2
        done
        if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
          rm -rf /var/lib/postgresql/data/*
          PGPASSWORD=apppass pg_basebackup \
            -h hp-primary -U app -D /var/lib/postgresql/data \
            -Fp -Xs -P -R
        fi
        exec postgres \
          -c hot_standby=on \
          -c primary_conninfo='host=hp-primary port=5432 user=app password=apppass' \
          -c listen_addresses='*' \
          -c password_encryption=md5
    volumes:
      - hp-standby-data:/var/lib/postgresql/data
    depends_on:
      hp-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 30s

  heliosproxy:
    build:
      context: ../../
      dockerfile: docker/Dockerfile
    container_name: cmp-heliosproxy
    hostname: heliosproxy
    networks:
      - compare-net
    ports:
      - "56432:6432"
      - "59090:9090"
    volumes:
      - ./proxy.toml:/etc/helios/proxy.toml:ro
    depends_on:
      hp-primary:
        condition: service_healthy
      hp-standby:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 10s

  # ═══════════════════════════════════════════════════════════════════════
  # PGBOUNCER CLUSTER
  # ═══════════════════════════════════════════════════════════════════════

  pb-primary:
    image: postgres:16-alpine
    container_name: pb-primary
    hostname: pb-primary
    networks:
      - compare-net
    ports:
      - "55532:5432"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: benchdb
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "hot_standby=on"
      - "-c"
      - "synchronous_commit=on"
      - "-c"
      - "synchronous_standby_names='*'"
      - "-c"
      - "listen_addresses=*"
      - "-c"
      - "password_encryption=md5"
    volumes:
      - pb-primary-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d benchdb"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 10s

  pb-standby:
    image: postgres:16-alpine
    container_name: pb-standby
    hostname: pb-standby
    networks:
      - compare-net
    ports:
      - "55542:5432"
    environment:
      PGUSER: app
      PGPASSWORD: apppass
    entrypoint: /bin/bash
    command:
      - -c
      - |
        until pg_isready -h pb-primary -U app; do
          echo "Waiting for primary..."
          sleep 2
        done
        if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
          rm -rf /var/lib/postgresql/data/*
          PGPASSWORD=apppass pg_basebackup \
            -h pb-primary -U app -D /var/lib/postgresql/data \
            -Fp -Xs -P -R
        fi
        exec postgres \
          -c hot_standby=on \
          -c primary_conninfo='host=pb-primary port=5432 user=app password=apppass' \
          -c listen_addresses='*' \
          -c password_encryption=md5
    volumes:
      - pb-standby-data:/var/lib/postgresql/data
    depends_on:
      pb-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 30s

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: cmp-pgbouncer
    hostname: pgbouncer
    networks:
      - compare-net
    ports:
      - "56532:6432"
    volumes:
      - ./pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      pb-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U app"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 10s
