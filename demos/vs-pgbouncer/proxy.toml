# HeliosProxy configuration — vs PgBouncer Comparison Demo
# Transaction pooling with Transaction Replay enabled.
# Mirrors the PgBouncer workload so the comparison is apples-to-apples:
# when both primaries are killed simultaneously, HeliosProxy replays and
# PgBouncer drops connections — visible in the final report.

listen_address = "0.0.0.0:6432"
admin_address  = "0.0.0.0:9090"

tr_enabled = true
tr_mode    = "transaction"

write_timeout_secs = 15

[pool]
min_connections      = 2
max_connections      = 20
idle_timeout_secs    = 300
max_lifetime_secs    = 1800
acquire_timeout_secs = 10
test_on_acquire      = true

[pool_mode]
mode                    = "transaction"
max_pool_size           = 20
min_idle                = 2
idle_timeout_secs       = 300
max_lifetime_secs       = 1800
acquire_timeout_secs    = 5
reset_query             = "DISCARD ALL"
prepared_statement_mode = "track"

[load_balancer]
read_strategy        = "least_connections"
read_write_split     = true
latency_threshold_ms = 50

[health]
check_interval_secs = 2
check_timeout_secs  = 2
failure_threshold   = 2
success_threshold   = 2
check_query         = "SELECT 1"

[[nodes]]
host    = "hp-primary"
port    = 5432
role    = "primary"
weight  = 100
enabled = true
name    = "hp-primary"

[[nodes]]
host    = "hp-standby"
port    = 5432
role    = "standby"
weight  = 100
enabled = true
name    = "hp-standby"
