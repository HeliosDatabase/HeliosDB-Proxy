# HeliosProxy configuration — Bank Ledger Demo
# Transaction pooling with Transaction Replay for failover safety.

[general]
host = "0.0.0.0"
port = 6432
admin_host = "0.0.0.0"
admin_port = 9090
connect_timeout = 5000
idle_timeout = 30000
pool_mode = "transaction"

[transaction_replay]
enabled = true
mode = "transaction"

[pools.bankdb]
pool_size = 30
default_role = "primary"

[pools.bankdb.users.app]
password = "apppass"

[pools.bankdb.shards.0]
database = "bankdb"
servers = [
  ["pg-primary", 5432, "primary"],
  ["pg-standby", 5432, "replica"],
]
sync_standby_preferred = true

[healthcheck]
delay = 2000
timeout = 1000
