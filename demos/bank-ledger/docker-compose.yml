# HeliosProxy — Bank Ledger Demo
#
# Financial integrity under chaos: concurrent transfers with
# DEBIT+CREDIT invariant, primary killed multiple times.
# The total balance must ALWAYS be exactly $1,000,000.00.
#
# Usage:
#   docker compose up -d
#   ./workers.sh &
#   ./chaos.sh
#   ./audit.sh

networks:
  bank-net:
    driver: bridge

volumes:
  primary-data:
  standby-data:

services:
  # ─────────────────────────────────────────────────────────────────────
  # Primary PostgreSQL
  # ─────────────────────────────────────────────────────────────────────
  pg-primary:
    image: postgres:16-alpine
    container_name: bl-primary
    hostname: pg-primary
    networks:
      - bank-net
    ports:
      - "45432:5432"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: bankdb
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "hot_standby=on"
      - "-c"
      - "synchronous_commit=on"
      - "-c"
      - "listen_addresses=*"
      - "-c"
      - "password_encryption=md5"
    volumes:
      - primary-data:/var/lib/postgresql/data
      - ./init-hba.sh:/docker-entrypoint-initdb.d/01-hba-replication.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U app -d bankdb"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────
  # Standby PostgreSQL (streaming replication)
  # ─────────────────────────────────────────────────────────────────────
  pg-standby:
    image: postgres:16-alpine
    container_name: bl-standby
    hostname: pg-standby
    networks:
      - bank-net
    ports:
      - "45442:5432"
    environment:
      PGUSER: app
      PGPASSWORD: apppass
    user: postgres
    entrypoint: /bin/bash
    command:
      - -c
      - |
        until pg_isready -h pg-primary -U app; do
          echo "Waiting for primary..."
          sleep 2
        done
        if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
          rm -rf /var/lib/postgresql/data/*
          PGPASSWORD=apppass pg_basebackup \
            -h pg-primary -U app -D /var/lib/postgresql/data \
            -Fp -Xs -P -R
          chmod 750 /var/lib/postgresql/data
        fi
        exec postgres \
          -c hot_standby=on \
          -c primary_conninfo='host=pg-primary port=5432 user=app password=apppass' \
          -c listen_addresses='*' \
          -c password_encryption=md5
    volumes:
      - standby-data:/var/lib/postgresql/data
    depends_on:
      pg-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────
  # HeliosProxy — Transaction Replay enabled
  # ─────────────────────────────────────────────────────────────────────
  heliosproxy:
    image: ghcr.io/heliosdatabase/hdb-heliosdb-proxy:0.6.0
    container_name: bl-proxy
    hostname: heliosproxy
    networks:
      - bank-net
    ports:
      - "46432:6432"   # Client connections
      - "49090:9090"   # Admin / metrics API
    volumes:
      - ./proxy.toml:/etc/helios/proxy.toml:ro
    depends_on:
      pg-primary:
        condition: service_healthy
      pg-standby:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 10s
